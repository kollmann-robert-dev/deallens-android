
name: Build APK

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create demo APK
        run: |
          mkdir -p output
          echo "DealLens Demo App" > output/app-debug.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: deallens-apk
          path: output/app-debug.apk
